version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: secureauth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secureauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secureauth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: secureauth_mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port

  backend:
    build: ./backend
    container_name: secureauth_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/secureauth
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretaccesskeyforsecureauthplatform12345!
      - JWT_REFRESH_SECRET_KEY=supersecretrefreshkeyforsecureauthplatform12345!
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - BACKEND_CORS_ORIGINS=["http://localhost:3000"]
      - MAIL_SERVER=mailhog
      - MAIL_PORT=1025
      - MAIL_USERNAME=
      - MAIL_PASSWORD=
      - MAIL_FROM=noreply@secureauth.dev
      - MAIL_FROM_NAME=SecureAuth Support
      - MAIL_STARTTLS=False
      - MAIL_SSL_TLS=False
      - USE_CREDENTIALS=False
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: secureauth_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
